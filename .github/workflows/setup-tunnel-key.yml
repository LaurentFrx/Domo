name: Setup Matter Tunnel Key
on: workflow_dispatch

jobs:
  add-key:
    runs-on: ubuntu-latest
    steps:
      - name: Add matter-tunnel pubkey to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            PUBKEY='no-pty,no-X11-forwarding,no-agent-forwarding,no-user-rc,permitopen="127.0.0.1:5580",command="echo tunnel-only" ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGSYBsnVOGaUcx5xxAFJvfbx8vOyT15Rhwk3YRaC6Wb2 matter-tunnel'
            if grep -q "matter-tunnel" ~/.ssh/authorized_keys 2>/dev/null; then
              echo "Key already present"
            else
              echo "$PUBKEY" >> ~/.ssh/authorized_keys
              chmod 600 ~/.ssh/authorized_keys
              echo "Key added"
            fi
            echo "Authorized keys:"
            grep "matter-tunnel" ~/.ssh/authorized_keys
