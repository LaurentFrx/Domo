# Secrets requis dans Settings → Secrets → Actions :
#   VPS_HOST    = 204.168.129.228
#   VPS_USER    = laurent
#   VPS_SSH_KEY = clé privée d'une deploy key dédiée
#                 Générer : ssh-keygen -t ed25519 -f ~/.ssh/domo_deploy -N ""
#                 Ajouter la .pub dans /home/laurent/.ssh/authorized_keys
#
# Prérequis VPS (mis en place par scripts/bootstrap-vps.sh) :
#  - Node 20+ et pnpm installés (NodeSource + npm -g)
#  - Service systemd `domo` installé et activé
#  - /etc/sudoers.d/domo-deploy donne à laurent NOPASSWD sur
#    /bin/systemctl restart domo et /bin/systemctl reload caddy
name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/laurent/domo
            git fetch --prune origin
            git checkout -B main origin/main
            pnpm install --frozen-lockfile
            pnpm build
            sudo systemctl restart domo
            sleep 2
            systemctl is-active --quiet domo || (journalctl -u domo -n 20 --no-pager; exit 1)
            curl -fsS --max-time 10 http://127.0.0.1:3000/ -o /dev/null && echo "[deploy] domo actif et répond HTTP 200"
