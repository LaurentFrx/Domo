<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Domo" />
    <meta name="description" content="Domo — PWA domotique familiale" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-167.png" sizes="167x167" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-152.png" sizes="152x152" />

    <!-- Anti-FOUC theme : pose data-theme="dark" AVANT le rendu si l'utilisateur
         a choisi dark dans /reglages (lit le localStorage, synchrone). -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('domo.preferences.v1');
          if (!raw) return;
          var p = JSON.parse(raw);
          var effective = p.theme;
          if (p.autoTheme) {
            var h = new Date().getHours();
            effective = h >= 7 && h < 19 ? 'light' : 'dark';
          }
          if (effective === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
