# Docker Compose : domo (PWA SvelteKit) derrière Caddy

services:
  domo:
    build: .
    container_name: domo
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - web
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    container_name: domo-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - domo

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
