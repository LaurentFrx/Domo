# Docker Compose mutualisé : ha-pwa + ha-push-relay (à venir) derrière Caddy

services:
  ha-pwa:
    build: .
    container_name: ha-pwa
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - web
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    container_name: ha-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - ha-pwa

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
